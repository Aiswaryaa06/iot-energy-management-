services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./database:/usr/src/database
    environment:
      - PORT=5000
      - NODE_ENV=development
      - DB_FILE=../database/smarthome.db
      - DEFAULT_TARIFF=8.0
    restart: always

  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    environment:
      - API_URL=http://backend:5000/api
      - INTERVAL_MS=5000
    depends_on:
      - backend
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always